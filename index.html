  function b2u(b64){const s=atob(b64);const u=new Uint8Array(s.length);for(let i=0;i<s.length;i++)u[i]=s.charCodeAt(i);return u;}
  async function unlock(pw){
    const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);
    const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b2u(SALT_B64),iterations:ITER,hash:'SHA-256'},
      km,{name:'AES-GCM',length:256},false,['decrypt']);
    const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b2u(IV_B64)},key,b2u(CT_B64));
    return new TextDecoder().decode(pt);
  }
  const pw=document.getElementById('pw'), go=document.getElementById('go'), err=document.getElementById('err');
  async function attempt(){
    err.textContent=''; go.disabled=true; go.textContent='Unlocking…';
    try{
      const html=await unlock(pw.value);
      document.open(); document.write(html); document.close();
    }catch(e){
      err.textContent='Wrong password.'; go.disabled=false; go.textContent='Unlock';
      pw.value=''; pw.focus();
    }
  }
  go.addEventListener('click',attempt);
  pw.addEventListener('keydown',e=>{if(e.key==='Enter')attempt();});
